# -----------------------------------------------------------------------------
# INTEGRATIONS & EXTERNAL SERVICES
# -----------------------------------------------------------------------------
integrations:
  - name: "Mailchimp"
    purpose: "Email signup collection for pre-launch waitlist"
    type: "api"
    documentation_url: "https://mailchimp.com/developer/"
    auth_method: "api_key"
  - name: "WhatsApp Share API"
    purpose: "Viral sharing via WhatsApp (wa.me deep links)"
    type: "api"
    documentation_url: "https://faq.whatsapp.com/5913398998672934"
    auth_method: "none"

# -----------------------------------------------------------------------------
# BUSINESS MODEL
# -----------------------------------------------------------------------------
business:
  model: "freemium"
  pricing_tiers:
    - name: "Gratis"
      price: 0
      features: ["Expresión emocional básica", "1 niño vinculado", "Notificaciones al tutor"]
    - name: "Familia"
      price: 4.99
      billing: "monthly"
      features: ["Múltiples niños", "Historial emocional", "Actividades guiadas", "Contenido educativo"]
  revenue_targets:
    month_1: "500 signups en waitlist"
    month_6: "2,000 usuarios activos, 100 suscriptores Familia"
    month_12: "10,000 usuarios activos, 500 suscriptores Familia"
  key_metrics:
    - "Signups en waitlist (pre-launch)"
    - "WhatsApp shares por usuario"
    - "Expresiones emocionales por niño por semana"
    - "Tasa de apertura de notificaciones por padres"
    - "Conversión gratis → Familia"

# -----------------------------------------------------------------------------
# GO-TO-MARKET
# -----------------------------------------------------------------------------
launch:
  target_date: "2026-Q2"
  channels:
    - "WhatsApp (viral sharing — 71%+ penetración en Ecuador)"
    - "Facebook/Instagram (grupos de mamás ecuatorianas)"
    - "Escuelas y colegios en Ecuador"
    - "Psicólogos infantiles ecuatorianos (endorsements)"
    - "UNICEF Ecuador school counseling alignment"
  pre_launch:
    landing_page: true
    waitlist: true
    beta_testers: 50
  content_plan:
    - "Blog: ¿Cómo saber qué siente tu hijo cuando no habla?"
    - "Video: La importancia de la conexión emocional en familia"
    - "Infografía: 5 señales de que tu hijo necesita ser escuchado"

# -----------------------------------------------------------------------------
# TEAM & ROLES
# -----------------------------------------------------------------------------
team:
  human_roles:
    - name: "Sedao"
      role: "Founder / CEO"
  agent_overrides: {}

# -----------------------------------------------------------------------------
# CONSTRAINTS & PREFERENCES
# -----------------------------------------------------------------------------
constraints:
  budget: "$0-20/month infrastructure (GitHub Pages is free)"
  timeline: "Landing page: 1 week. MVP app: 8-12 weeks"
  geographic_focus: "Ecuador"
  language_support: ["es"]
  accessibility: "wcag-aa"
  mobile_first: true
  cultural_constraints:
    - "NEVER use 'trastorno mental', 'diagnóstico', or 'terapia' in user-facing copy"
    - "Frame everything as family connection, not mental health treatment"
    - "Use 'bienestar emocional', 'conexión familiar', 'comunicación emocional' instead"
    - "Android-first (75.9% market share in Ecuador)"
    - "Page must load under 3 seconds on 4G"
    - "Total page weight under 1MB"
    - "44px minimum touch targets for mobile"
