# =============================================================================
# DOMAIN CONFIGURATION — Arkangel
# =============================================================================
# This file is the single source of truth for all agents, subagents, and skills.
# Every agent MUST read this file before beginning work.
# =============================================================================

# -----------------------------------------------------------------------------
# PRODUCT IDENTITY
# -----------------------------------------------------------------------------
product:
  name: "Arkangel"
  tagline: "Fortalece la conexión emocional con tu hijo"
  description: "Arkangel es una app de comunicación emocional familiar. Los niños expresan sus emociones a través de la app, y los padres reciben lo que sienten en tiempo real. Juntos construyen una conexión más fuerte."
  stage: "mvp"
  repository: "https://github.com/SedaoAwana/arkangel-app"
  license: "proprietary"

# -----------------------------------------------------------------------------
# PROBLEM & SOLUTION
# -----------------------------------------------------------------------------
problem:
  statement: "1 de cada 10 niños enfrenta un desafío emocional, pero la mayoría no encuentra las palabras para pedir ayuda. Los padres quieren ayudar pero no saben qué siente su hijo."
  current_alternatives:
    - "Terapia infantil presencial (cara, estigmatizada en Ecuador)"
    - "Apps de meditación para niños (Moshi, Headspace — contenido unidireccional, sin conexión padre-hijo)"
    - "Brightline/Little Otter (conectan con terapeutas, no con padres)"
    - "Hablar directamente (los niños no siempre tienen las palabras)"
  why_now: "La salud mental infantil post-pandemia está en crisis. Ecuador registró 15,521 hospitalizaciones pediátricas por salud mental entre 2015-2022. Los padres buscan herramientas proactivas, no reactivas."

solution:
  approach: "Modelo de doble usuario: el niño expresa emociones en la app usando personajes (arkangeles), y el padre/tutor recibe esas emociones en tiempo real. La app facilita la conversación, no la reemplaza."
  key_differentiator: "Ningún competidor conecta directamente al niño con su padre a través de comunicación emocional. Brightline y Little Otter conectan con terapeutas. Moshi y Headspace entregan contenido al niño solo."
  unfair_advantage: "Profundo entendimiento cultural de familismo ecuatoriano. Posicionamiento como fortalecimiento familiar, no tratamiento de salud mental."

# -----------------------------------------------------------------------------
# TARGET USERS
# -----------------------------------------------------------------------------
users:
  primary_persona:
    name: "La Mamá Protectora"
    description: "Madre ecuatoriana de 28-45 años, con hijos de 5-12 años. Usa Android, WhatsApp como canal principal de comunicación. Valora profundamente la conexión familiar (familismo). Preocupada por el bienestar emocional de su hijo pero no usaría una app que diga 'salud mental' por estigma social."
    pain_points:
      - "No sabe qué siente su hijo cuando no habla"
      - "Le cuesta abordar temas emocionales difíciles"
      - "No quiere que su familia sea vista como 'con problemas'"
      - "Las opciones de terapia son caras o inaccesibles"
    goals:
      - "Entender las emociones de su hijo"
      - "Fortalecer la comunicación familiar"
      - "Ser una mamá/papá más presente emocionalmente"
      - "Prevenir problemas emocionales antes de que escalen"
    tech_comfort: "beginner"
  secondary_personas:
    - name: "El Niño Expresivo"
      description: "Niño/a de 5-12 años que usa la app para expresar cómo se siente a través de personajes (arkangeles). No necesita escribir — elige emociones visualmente."
      pain_points:
        - "No tiene palabras para lo que siente"
        - "Le da vergüenza hablar de emociones"
        - "No sabe cómo pedir ayuda"
      goals:
        - "Sentirse escuchado"
        - "Comunicar emociones sin miedo"
        - "Conectar con su papá/mamá/tutor"
      tech_comfort: "beginner"

# -----------------------------------------------------------------------------
# CORE FEATURES (MVP)
# -----------------------------------------------------------------------------
features:
  mvp:
    - name: "Pre-launch Landing Page"
      description: "Página de acceso anticipado con signup de email, WhatsApp share, y propuesta de valor clara del modelo doble-usuario"
      priority: "p0"
      ai_powered: false
    - name: "Expresión Emocional del Niño"
      description: "El niño selecciona un arkangel y expresa su emoción actual usando interfaz visual (no texto)"
      priority: "p0"
      ai_powered: false
    - name: "Notificación al Padre/Tutor"
      description: "El padre recibe en tiempo real lo que su hijo expresó, con contexto y sugerencias de cómo abordar la conversación"
      priority: "p0"
      ai_powered: false
    - name: "Perfil Familiar"
      description: "Configuración de la relación niño-tutor, con vinculación de cuentas"
      priority: "p0"
      ai_powered: false
  future:
    - name: "Historial Emocional"
      description: "Dashboard para el padre mostrando patrones emocionales del niño a lo largo del tiempo"
      priority: "p1"
    - name: "Actividades Guiadas"
      description: "Ejercicios de comunicación emocional para hacer juntos padre e hijo"
      priority: "p1"
    - name: "Contenido Educativo para Padres"
      description: "Tips y artículos sobre comunicación emocional infantil"
      priority: "p2"

